<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="icon" href="assets/images/favicon.jpg" type="image/jpg">
        <link rel="stylesheet" href="style/pages/style_index.css">

        <script defer src="script/script.js"></script>
        <script defer src="script/change_language.js"></script>
        <script defer src="script/hero_animate.js"></script>
        
        <title>Trip Store</title>
    </head>

    <body>
        
        <div class="background">
            <div class="noise"></div>
            <div class="vignette"></div>
            <div class="blobs"></div>
        </div>

        <canvas id="particles"></canvas>
        
        <header>
            <div class="header_left_side">
                <img src="./assets/images/favicon.jpg">
                <h1>Trip Store</h1>
            </div>

            <div class="header_right_side">
                <a href="pages/enter/sign_in.html">Sign In</a>
                <a href="pages/enter/sign_up.html">Sign Up</a>
            </div>
        </header>

        <main>

            <section class="hero">

                <section class="first_section">
                    
                    <img class="side_image left" src="assets/images/woman.png">
                    
                    <div id="start_home">
                    
                        <video autoplay muted loop playsinline>
                            <source src="assets/videos/Forest.mp4" type="video/mp4">
                        </video>

                        <div id="content">
                            <h1 id="content_title"></h1>
                        </div>
                    </div>

                    <img class="side_image right" src="assets/images/world.webp">
                </section>
            </section>

            <section class="second_section">
                <h2>Main Tourist Attractions</h2>

                <div class="carousel_external">

                    <div class="carrousel_internal">

                        <div class="card_trip">
                            <h3>Eiffel Tower</h3>
                            <img src="./assets/images/places/eiffel.avif" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Coliseum</h3>
                            <img src="./assets/images/places/coliseum.avif" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Christ the Redeemer</h3>
                            <img src="./assets/images/places/cristo.jpg" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Louvre Museum</h3>
                            <img src="./assets/images/places/louvre.jpg" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Great Wall of China</h3>
                            <img src="./assets/images/places/greatWall.jpg" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Burj Khalifa</h3>
                            <img src="./assets/images/places/burj.jpg" width="280" height="280">
                        </div>
                    </div>

                    <div aria-hidden class="carrousel_internal">

                        <div class="card_trip">
                            <h3>Eiffel Tower</h3>
                            <img src="./assets/images/places/eiffel.avif" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Coliseum</h3>
                            <img src="./assets/images/places/coliseum.avif" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Christ the Redeemer</h3>
                            <img src="./assets/images/places/cristo.jpg" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Louvre Museum</h3>
                            <img src="./assets/images/places/louvre.jpg" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Great Wall of China</h3>
                            <img src="./assets/images/places/greatWall.jpg" width="280" height="280">
                        </div>

                        <div class="card_trip">
                            <h3>Burj Khalifa</h3>
                            <img src="./assets/images/places/burj.jpg" width="280" height="280">
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer></footer>

    </body>
</html>
