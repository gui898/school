<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exercicio 1</title>
</head>

<body>

    <h2 style="background-color: peru; width: 500px;">Sistema de Gestão Acadêmica</h2>
    <h2>MANUTENÇÃO DE USUÁRIOS DO SISTEMA INTERNO</h2>

    <form action="">

        <div class="box">
            <label for="">Login</label>
            <div class="inputs">
                <input type="text" id="">
            </div>
        </div>

        <div class="box">
            <label for="">Senha</label>
            <div class="inputs">
                <input type="password" id="passIn">
            </div>
        </div>

        <br>

        <div class="box">
            <label for="">Status</label>
            <div class="inputs">
                <select name="selc" id="">
                    <option value="inativo">Inativo</option>
                    <option value="ativo">Ativo</option>
                </select>
            </div>
        </div>

        <br>
        <div class="box">
            <label for="">Tipo</label>
            <div class="inputs">
                <input name="tipo" type="radio">
                <label for="">Técnico</label>
                <input name="tipo" type="radio">
                <label for="">Professor</label>
                <input name="tipo" type="radio">
                <label for="">Aluno</label>
            </div>
        </div>

        <br>

        <div class="box">
            <label for="">Perfil</label>
            <div class="inputs">
                <input name="perfil" type="radio">
                <label for="">Convidado</label>
                <input name="perfil" type="radio">
                <label for="">Administrador</label>
            </div>
        </div>

        <br>

        <div class="box">
            <label for="">Observações</label>
            <div class="inputs">
                <textarea class="textbox"></textarea>
            </div>
        </div>

        <br>

        <div class="box">
            <label for="">Módulos</label>
            <div class="inputs module_opt">
                <input type="checkbox" name="" id="">
                <label for="">Compras</label>
                <input type="checkbox" name="" id="">
                <label for="">Biblioteca</label>
                <input type="checkbox" name="" id="">
                <label for="">Acadêmico</label>
                <input type="checkbox" name="" id="">
                <label for="">Documentação</label>
                <input type="checkbox" name="" id="">
                <label for="">Recursos Humanos</label>
            </div>
        </div>

        <input value="Cadastrar" type="submit">
        <input value="Excluir" type="submit">

    </form>

</body>

</html>
